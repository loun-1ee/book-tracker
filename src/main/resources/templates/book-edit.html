<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>책 수정</title>
</head>
<body>

<h1>✏️ 책 수정</h1>

<div>
    <img th:src="${book.thumbnail}" width="80" th:if="${book.thumbnail}"/>
    <h2 th:text="${book.title}"></h2>
    <p th:text="${book.author}"></p>
    <p th:text="${book.publisher}"></p>
</div>

<form th:action="@{/books/{id}/edit(id=${book.id})}" th:object="${book}" method="post">

    <div>
        <label>독서 상태</label>
        <select th:field="*{status}">
            <option value="WANT">읽고 싶어요</option>
            <option value="READING">읽는 중</option>
            <option value="DONE">다 읽었어요</option>
        </select>
    </div>

    <div>
        <label>별점</label>
        <input type="number" th:field="*{rating}" min="1" max="5"/>
    </div>

    <div>
        <label>메모</label>
        <textarea th:field="*{memo}" rows="10" cols="50"
                  placeholder="독후감, 인용구, 느낀점 자유롭게 작성하세요"></textarea>
    </div>

    <button type="submit">저장</button>
    <a href="/">취소</a>

</form>

</body>
</html>
