<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 책장</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #F3E4C9;
            font-family: 'Georgia', serif;
            color: #3d2b1f;
            padding: 40px 20px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }

        header h1 { font-size: 28px; color: #3d2b1f; }

        .header-actions { display: flex; gap: 10px; }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            text-decoration: none;
            color: white;
            background: #A98B76;
        }

        .btn:hover { background: #BFA28C; }

        /* 탭 */
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            text-decoration: none;
            color: #A98B76;
            background: #FFFDF7;
            border: 1px solid #BFA28C;
            transition: all 0.2s;
        }

        .tab:hover { background: #BFA28C; color: white; }

        .tab.active {
            background: #A98B76;
            color: white;
            border-color: #A98B76;
        }

        /* 별점 필터 (다읽었어요 탭일 때만) */
        .rating-filter {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }

        .rating-filter span {
            font-size: 13px;
            color: #A98B76;
            margin-right: 4px;
        }

        .rating-tab {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            text-decoration: none;
            color: #A98B76;
            background: #FFFDF7;
            border: 1px solid #BFA28C;
            transition: all 0.2s;
        }

        .rating-tab:hover { background: #BABF94; color: white; border-color: #BABF94; }

        .rating-tab.active {
            background: #BABF94;
            color: white;
            border-color: #BABF94;
        }

        /* 카드 */
        .empty {
            text-align: center;
            color: #BFA28C;
            font-style: italic;
            margin-top: 80px;
            font-size: 16px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 24px;
        }

        .card {
            background: #FFFDF7;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(101, 67, 33, 0.1);
            text-decoration: none;
            color: #3d2b1f;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(101, 67, 33, 0.18);
        }

        .card-thumbnail {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }

        .card-thumbnail-empty {
            width: 100%;
            aspect-ratio: 2/3;
            background: #BFA28C;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFDF7;
            font-size: 12px;
        }

        .card-body {
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .card-title {
            font-size: 13px;
            font-weight: bold;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-status {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 20px;
            background: #BABF94;
            color: #FFFDF7;
            align-self: flex-start;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 22px; }
            .card-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📚 내 책장</h1>
        <div class="header-actions">
            <a href="/stats" class="btn">📊 통계</a>
            <a href="/search" class="btn">🔍 책 검색</a>
            <a href="/books/new" class="btn">+ 직접 추가</a>
        </div>
    </header>

    <!-- 탭 -->
    <div class="tabs">
        <a href="/?status=ALL" class="tab" th:classappend="${status == 'ALL'} ? 'active'">전체</a>
        <a href="/?status=WANT" class="tab" th:classappend="${status == 'WANT'} ? 'active'">읽고 싶어요</a>
        <a href="/?status=READING" class="tab" th:classappend="${status == 'READING'} ? 'active'">읽는 중</a>
        <a href="/?status=DONE" class="tab" th:classappend="${status == 'DONE'} ? 'active'">다 읽었어요</a>
    </div>

    <!-- 별점 필터 (다읽었어요 탭일 때만) -->
    <div class="rating-filter" th:if="${status == 'DONE'}">
        <span>별점</span>
        <a th:href="@{/(status='DONE')}" class="rating-tab" th:classappend="${rating == null} ? 'active'">전체</a>
        <a th:each="i : ${#numbers.sequence(5, 1, -1)}"
           th:href="@{/(status='DONE', rating=${i})}"
           class="rating-tab"
           th:classappend="${rating == i} ? 'active'"
           th:text="${#strings.repeat('★', i)}">
        </a>
    </div>

    <!-- 책 목록 -->
    <div th:if="${#lists.isEmpty(books)}" class="empty">
        <p>책이 없어요 📖</p>
    </div>

    <div class="card-grid" th:unless="${#lists.isEmpty(books)}">
        <a th:each="book : ${books}"
           th:href="@{/books/{id}(id=${book.id})}"
           class="card">
            <img class="card-thumbnail"
                 th:if="${book.thumbnail}"
                 th:src="${book.thumbnail}"/>
            <div class="card-thumbnail-empty"
                 th:unless="${book.thumbnail}">표지 없음</div>
            <div class="card-body">
                <span class="card-title" th:text="${book.title}"></span>
                <span class="card-status"
                      th:text="${book.status == 'WANT'} ? '읽고 싶어요' : (${book.status == 'READING'} ? '읽는 중' : '다 읽었어요')">
                </span>
            </div>
        </a>
    </div>
</div>
</body>
</html>
