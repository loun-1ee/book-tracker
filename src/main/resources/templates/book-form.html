<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>책 추가</title>
</head>
<body>

<h1>📖 책 추가</h1>

<form th:action="@{/books}" th:object="${book}" method="post">

    <div>
        <label>제목</label>
        <input type="text" th:field="*{title}"/>
    </div>
    <div>
        <label>저자</label>
        <input type="text" th:field="*{author}">
    </div>
    <div>
        <label>출판사</label>
        <input type="text" th:field="*{publisher}">
    </div>
    <div>
        <label>표지 이미지 URL</label>
        <input type="text" th:field="*{thumbnail}">
    </div>
    <div>
        <label>독서 상태</label>
        <select th:field="*{status}">
            <option value="WANT">읽고 싶은 책</option>
            <option value="READING">읽고 있는 책</option>
            <option value="DONE">다 읽은 책</option>
        </select>
    </div>
    <div>
        <label>별점</label>
        <input type="number" th:field="*{rating}" min="1" max="5"/>
    </div>
    <div>
        <label>한줄평</label>
        <input type="text" th:field="*{review}"/>
    </div>

    <button type="submit">저장</button>
    <a href="/">취소</a>

</form>

</body>
</html>
