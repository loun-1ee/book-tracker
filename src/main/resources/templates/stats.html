<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>독서 통계</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #F3E4C9;
            font-family: 'Georgia', serif;
            color: #3d2b1f;
            padding: 40px 20px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        .back-link {
            display: inline-block;
            margin-bottom: 24px;
            color: #A98B76;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover { text-decoration: underline; }

        h1 {
            font-size: 26px;
            margin-bottom: 32px;
            color: #3d2b1f;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: #FFFDF7;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(101, 67, 33, 0.1);
            text-align: center;
        }

        .stat-card .number {
            font-size: 48px;
            font-weight: bold;
            color: #A98B76;
            line-height: 1.2;
        }

        .stat-card .label {
            font-size: 14px;
            color: #BFA28C;
            margin-top: 8px;
        }

        .chart-card {
            background: #FFFDF7;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 16px rgba(101, 67, 33, 0.1);
            margin-bottom: 24px;
        }

        .chart-card h2 {
            font-size: 18px;
            color: #3d2b1f;
            margin-bottom: 24px;
        }

        .chart-wrapper {
            max-width: 400px;
            margin: 0 auto;
        }

        .no-data {
            text-align: center;
            color: #BFA28C;
            font-style: italic;
            padding: 40px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 20px; }
            .stat-card .number { font-size: 36px; }
        }
    </style>
</head>
<body>
<div class="container">
    <a href="/" class="back-link">← 내 책장으로</a>
    <h1>📊 독서 통계</h1>

    <!-- 요약 카드 -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="number" th:text="${readThisYear}">0</div>
            <div class="label">올해 읽은 책</div>
        </div>
        <div class="stat-card">
            <div class="number" th:text="${totalDone}">0</div>
            <div class="label">전체 완독</div>
        </div>
        <div class="stat-card">
            <div class="number" th:text="${#numbers.formatDecimal(averageRating, 1, 1)}">0.0</div>
            <div class="label">평균 별점</div>
        </div>
    </div>

    <!-- 장르별 원형 그래프 -->
    <div class="chart-card">
        <h2>📚 장르별 독서 현황</h2>
        <div th:if="${genreStats.isEmpty()}" class="no-data">
            아직 장르 정보가 없어요. 책에 장르를 추가해보세요!
        </div>
        <div th:unless="${genreStats.isEmpty()}" class="chart-wrapper">
            <canvas id="genreChart"></canvas>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const genreStats = /*[[${genreStats}]]*/ {};

    const genreLabels = {
        'NOVEL': '소설',
        'SELF_DEV': '자기계발',
        'ECONOMY': '경제/경영',
        'HUMANITIES': '인문학',
        'SCIENCE': '과학',
        'HISTORY': '역사',
        'ART': '예술',
        'IT': 'IT/개발',
        'OTHER': '기타'
    };

    if (Object.keys(genreStats).length > 0) {
        const labels = Object.keys(genreStats).map(k => genreLabels[k] || k);
        const data = Object.values(genreStats);

        new Chart(document.getElementById('genreChart'), {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: [
                        '#A98B76', '#BFA28C', '#BABF94',
                        '#C8B89A', '#9da876', '#D4C5B0',
                        '#8B7355', '#E8DDD0'
                    ],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            font: { family: 'Georgia' },
                            color: '#3d2b1f',
                            padding: 16
                        }
                    }
                }
            }
        });
    }
</script>
</body>
</html>
