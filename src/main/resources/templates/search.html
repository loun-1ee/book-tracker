<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>책 검색</title>
</head>
<body>

<h1>🔍 책 검색</h1>

<form action="/search" method="get">
    <input type="text" name="query" th:value="${query}" placeholder="책 제목을 입력하세요"/>
    <button type="submit">검색</button>
</form>

<div th:if="${result}">
    <h2>검색 결과</h2>
    <div th:each="book : ${result['documents']}">
        <img th:src="${book['thumbnail']}" width="60"/>
        <span th:text="${book['title']}"></span>
        <span th:text="${book['authors']}"></span>
        <span th:text="${book['publisher']}"></span>
        <form action="/books" method="post">
            <input type="hidden" name="title" th:value="${book['title']}"/>
            <input type="hidden" name="author" th:value="${book['authors'][0]}"/>
            <input type="hidden" name="publisher" th:value="${book['publisher']}"/>
            <input type="hidden" name="thumbnail" th:value="${book['thumbnail']}"/>
            <input type="hidden" name="status" value="WANT"/>
            <button type="submit">+ 담기</button>
        </form>
        <hr/>
    </div>
</div>

<a href="/">← 내 책장으로</a>


</body>
</html>
