<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>책 검색</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #F3E4C9;
            font-family: 'Georgia', serif;
            color: #3d2b1f;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 24px;
            color: #A98B76;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover { text-decoration: underline; }

        h1 {
            font-size: 26px;
            margin-bottom: 24px;
            color: #3d2b1f;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 32px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #BFA28C;
            border-radius: 8px;
            background: #FFFDF7;
            font-family: 'Georgia', serif;
            font-size: 15px;
            color: #3d2b1f;
            outline: none;
        }

        .search-box input:focus {
            border-color: #A98B76;
        }

        .search-box button {
            padding: 12px 24px;
            background: #A98B76;
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Georgia', serif;
            font-size: 15px;
            cursor: pointer;
        }

        .search-box button:hover { background: #BFA28C; }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .result-card {
            background: #FFFDF7;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(101, 67, 33, 0.1);
            display: flex;
            flex-direction: column;
        }

        .result-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
        }

        .no-image {
            width: 100%;
            aspect-ratio: 2/3;
            background: #BFA28C;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFDF7;
            font-size: 12px;
        }

        .result-body {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
        }

        .result-title {
            font-size: 13px;
            font-weight: bold;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .result-author {
            font-size: 12px;
            color: #BFA28C;
        }

        .result-card form {
            padding: 0 12px 12px;
        }

        .add-btn {
            width: 100%;
            padding: 8px;
            background: #BABF94;
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Georgia', serif;
            font-size: 13px;
            cursor: pointer;
        }

        .add-btn:hover { background: #9da876; }

        .empty {
            text-align: center;
            color: #BFA28C;
            font-style: italic;
            margin-top: 60px;
            font-size: 15px;
        }

        @media (max-width: 600px) {
            h1 { font-size: 20px; }
            .result-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; }
            .search-box button { padding: 12px 16px; }
        }
    </style>
</head>
<body>
<div class="container">
    <a href="/" class="back-link">← 내 책장으로</a>
    <h1>🔍 책 검색</h1>

    <div class="search-box">
        <form action="/search" method="get" style="display:flex; gap:10px; width:100%;">
            <input type="text" name="query" th:value="${query}" placeholder="책 제목을 입력하세요"/>
            <button type="submit">검색</button>
        </form>
    </div>

    <div th:if="${result}">
        <div class="result-grid">
            <div class="result-card" th:each="book : ${result['documents']}">
                <img th:if="${book['thumbnail']}" th:src="${book['thumbnail']}"/>
                <div class="no-image" th:unless="${book['thumbnail']}">표지 없음</div>
                <div class="result-body">
                    <span class="result-title" th:text="${book['title']}"></span>
                    <span class="result-author" th:text="${book['authors']}"></span>
                </div>
                <form action="/books" method="post">
                    <input type="hidden" name="title" th:value="${book['title']}"/>
                    <input type="hidden" name="author" th:value="${book['authors'][0]}"/>
                    <input type="hidden" name="publisher" th:value="${book['publisher']}"/>
                    <input type="hidden" name="thumbnail" th:value="${book['thumbnail']}"/>
                    <input type="hidden" name="status" value="WANT"/>
                    <button type="submit" class="add-btn">+ 담기</button>
                </form>
            </div>
        </div>
    </div>

    <div th:unless="${result}" class="empty">
        <p>검색어를 입력해보세요 📖</p>
    </div>
</div>
</body>
</html>
